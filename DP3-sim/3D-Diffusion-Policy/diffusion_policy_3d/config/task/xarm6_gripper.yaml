name: xarm6_gripper
task_name: xarm6_gripper

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [512, 3] # Adjust point cloud size based on sampling or policy default
      type: point_cloud
    agent_pos:
      shape: [7]  
      type: low_dim
  action:
    shape: [7]

env_runner:
  _target_: diffusion_policy_3d.env_runner.pybullet_runner.XArm6GripperPyBulletRunner
  eval_episodes: 2
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  task_name: xarm6_gripper
  use_point_crop: ${policy.use_point_crop}

dataset:
  _target_: diffusion_policy_3d.dataset.adroit_dataset.AdroitDataset
  zarr_path: /share1/abhinav.pv/data/xarm_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 200
